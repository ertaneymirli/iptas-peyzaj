<form id="kullaniciForm" class="kullanici-form">
    <input type="hidden" id="kullaniciDocId">

    <label>Kullanıcı Adı</label>
    <input type="text" id="kullaniciAdi" required>

    <label>Şifre</label>
    <input type="password" id="sifre" placeholder="Düzenlemede boş bırakılırsa değişmez">

    <label>Ad</label>
    <input type="text" id="ad" required>

    <label>Soyad</label>
    <input type="text" id="soyad" required>

    <label>Telefon</label>
    <input type="text" id="cepTelefonNo">

    <label>Mail</label>
    <input type="email" id="mail">

    <label>Rol</label>
    <select id="rol">
        <option value="1">Admin</option>
        <option value="2">Kullanıcı</option>
    </select>

    <button type="submit">Kaydet</button>
</form>
