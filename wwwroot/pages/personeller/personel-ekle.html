<form id="personelForm" class="personel-form">

    <input type="hidden" id="personelDocId">

    <label>Id</label>
    <input type="number" id="personelId" required>

    <label>Personel No</label>
    <input type="number" id="personelNo" required>

    <label>Ad</label>
    <input type="text" id="personelAd" required>

    <label>Soyad</label>
    <input type="text" id="personelSoyad" required>

    <label>Telefon</label>
    <input type="text" id="personelTelefon">

    <label>Görev</label>
    <input type="text" id="personelGorev">

    <button type="submit">
        Kaydet
    </button>

</form>
